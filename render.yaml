services:
  - type: web
    name: regtracker
    env: php
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: bash start.sh
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
